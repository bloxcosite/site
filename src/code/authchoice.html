<!doctype html>
<html lang="en" class="dark-mode" data-bs-theme="dark">
    <head>
        <title>Authenticate</title>
        <link rel="icon" type="image/png" href="https://bloxco.org/src/media/graphics/BloxcoGraphics/BloxcoSiteIcon.png">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
        <style>
            body {
                background-color: #222222;
                color: white;
                display: flex;
                align-items: center;
                justify-content: center;
                height: 100vh;
                margin: 0;
            }
            .accent {
                color: #2049A4 !important;
            }
        </style>
    </head>
    <body>
        <div class="container" style="text-align: center;">
            <h1>Welcome<span class="accent">.</span></h1>
            <h3 style="font-weight: normal;">How would you like to <span class="accent">authenticate</span>?</h3>
            <div class="login-options" style="justify-content: center; margin-top: 10px;">
                <button type="button" class="btn btn-primary" onclick="url_for('login', provider='roblox')" style="width: 150px; height: 40px;"><i class="fa-brands fa-discord" style="color: #ffffff;"></i> Discord</button>
                <button type="button" class="btn btn-secondary" onclick="url_for('login', provider='discord')" style="width: 150px; height: 40px;"><i class="fa-solid fa-gamepad" style="color: #ffffff;"></i> Roblox</button>
            </div>
        </div>
    </body>
</html>
